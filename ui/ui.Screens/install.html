<!-- 🌸 Lotus Assistant — Install Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install Lotus Assistant</title>

  <!-- Manifest so Chrome knows it's installable -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./lotus-192.png" />

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      margin-bottom: 1rem;
      color: #ffb6c1;
    }
    button {
      background: #ffb6c1;
      color: #111;
      border: none;
      padding: 0.8rem 1.6rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #fff;
      color: #111;
    }
  </style>
</head>
<body>
  <h1>🌸 Install Lotus Assistant</h1>
  <button id="installBtn">Download App</button>

  <script>
    let deferredPrompt;

    // Detect install prompt
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById("installBtn").style.display = "block";
    });

    // Trigger install
    document.getElementById("installBtn").addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        console.log("User choice:", choice.outcome);
        deferredPrompt = null;
      } else {
        alert("App already installed or not installable yet.");
      }
    });
  </script>
</body>
</html>

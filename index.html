<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lotus Assistant</title>

  <script>
    async function waitForFiles() {
      const installPage = "ui/ui.Screens/install.html";
      const indexJS = "ui/ui.Scripts/index.js";

      // Try up to 20 times (6 seconds total)
      for (let i = 0; i < 20; i++) {
        try {
          const installCheck = await fetch(installPage, { method: "HEAD" });
          const jsCheck = await fetch(indexJS, { method: "HEAD" });

          if (installCheck.ok && jsCheck.ok) {
            // Both files exist — redirect
            window.location.href = installPage;
            return;
          }
        } catch (e) {
          // ignore and retry
        }

        // Wait 300ms before retrying
        await new Promise(r => setTimeout(r, 300));
      }

      // If still not found
      document.body.innerHTML = `
        <p style="color:white;">
          Unable to load required files.<br>
          <b>${installPage}</b> or <b>${indexJS}</b> not found.
        </p>`;
    }

    document.addEventListener("DOMContentLoaded", waitForFiles);
  </script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>

<body>
  <p>Loading Lotus Assistant…</p>
</body>
</html>
